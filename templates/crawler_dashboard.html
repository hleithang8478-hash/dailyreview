{% extends 'base.html' %}
{% block title %}爬虫数据看板 · ReviewsDaily{% endblock %}
{% block head_extra %}
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #05070f;
            --card: rgba(16, 22, 36, 0.75);
            --border: rgba(103, 232, 249, 0.18);
            --text: #e6edf7;
            --muted: #8fa3bf;
            --cyan: #22d3ee;
            --blue: #60a5fa;
            --green: #34d399;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background: radial-gradient(circle at 20% 0%, #12203d 0%, var(--bg) 42%), var(--bg);
            color: var(--text);
        }
        .wrap { max-width: 1280px; margin: 0 auto; padding: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .title { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
        .nav-pills {
            display: inline-flex;
            padding: 4px;
            border-radius: 999px;
            background: rgba(8, 12, 24, 0.65);
            border: 1px solid var(--border);
        }
        .nav-pill {
            color: var(--muted);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            transition: color .2s, background .2s, box-shadow .2s;
        }
        .nav-pill:hover { color: var(--text); background: rgba(34, 211, 238, 0.08); }
        .nav-pill.active {
            color: #042f2e;
            background: linear-gradient(135deg, #5eead4, #22d3ee);
            box-shadow: 0 0 18px rgba(34, 211, 238, 0.3);
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .auto-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
        }
        .auto-refresh label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .auto-refresh select {
            border: 1px solid var(--border);
            background: rgba(10, 15, 27, 0.85);
            color: var(--text);
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }
        .back {
            color: var(--text); text-decoration: none; border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 999px; background: rgba(10, 15, 27, 0.7);
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }
        .panel h3 { margin: 0 0 10px; font-size: 16px; color: #cfe5ff; }

        .sidebar {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            max-width: 92vw;
            height: 100vh;
            background: rgba(9, 14, 26, 0.98);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.45);
            z-index: 99;
            transition: right 0.25s ease;
            display: flex;
            flex-direction: column;
            padding: 14px;
        }
        .sidebar.open { right: 0; }
        .sidebar-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .toggle-btn {
            border: 1px solid var(--border);
            background: rgba(15, 20, 33, 0.8);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 8px;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            color: #cfe5ff;
        }
        .summary-table th,
        .summary-table td {
            border-bottom: 1px solid rgba(143, 163, 191, 0.18);
            padding: 8px 10px;
            text-align: left;
        }
        .summary-table th { color: #93abc9; font-weight: 600; }
        .summary-total {
            margin-top: 10px;
            color: #9fb4d1;
            font-size: 13px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .list-head {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .toolbar {
            display: grid;
            grid-template-columns: 1.2fr repeat(3, minmax(120px, 1fr)) auto auto auto;
            gap: 8px;
            margin-bottom: 10px;
        }
        .toolbar input,
        .toolbar select {
            border: 1px solid var(--border);
            background: rgba(10, 15, 27, 0.85);
            color: var(--text);
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
        }
        .more-btn {
            border: 1px solid var(--border);
            background: rgba(15, 20, 33, 0.8);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .item {
            border: 1px solid rgba(143, 163, 191, 0.2);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(8, 12, 22, 0.65);
        }
        .item-title { color: #dce9ff; text-decoration: none; font-size: 14px; }
        .item-meta { color: var(--muted); font-size: 12px; margin-top: 5px; }
        .item-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .item-actions a {
            font-size: 11px; padding: 4px 8px; border-radius: 6px; text-decoration: none;
            border: 1px solid rgba(99, 102, 241, 0.45); color: #a5b4fc; background: rgba(99, 102, 241, 0.12);
        }
        .item-actions a:hover { background: rgba(99, 102, 241, 0.22); color: #e0e7ff; }
        .item-actions .btn-timeline-add {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(52, 211, 153, 0.55);
            color: #6ee7b7;
            background: rgba(52, 211, 153, 0.14);
        }
        .item-actions .btn-timeline-add:hover {
            background: rgba(52, 211, 153, 0.26);
            color: #a7f3d0;
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.25);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-16px);
            opacity: 0;
            pointer-events: none;
            z-index: 10001;
            padding: 11px 22px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(52, 211, 153, 0.35);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            transition: opacity 0.28s ease, transform 0.28s ease;
            max-width: min(420px, 92vw);
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .terminal {
            background: #020409;
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 10px;
            padding: 12px;
            height: 220px;
            overflow-y: auto;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            color: #7ef29f;
            line-height: 1.55;
            box-shadow: inset 0 0 20px rgba(52, 211, 153, 0.08);
        }
        .log-line { white-space: pre-wrap; margin-bottom: 4px; }

        @media (max-width: 960px) {
            .cards { grid-template-columns: 1fr; }
        }
    </style>
{% endblock %}
{% block content %}
<div class="wrap">
    <div class="topbar">
        <div class="title">爬虫数据看板</div>
        <div class="topbar-right">
            <div class="auto-refresh" title="按间隔重新请求列表与渠道统计（不依赖 feed_state，定时必刷新）">
                <label>
                    <input type="checkbox" id="autoRefreshToggle" checked>
                    自动刷新
                </label>
                <select id="autoRefreshInterval" aria-label="自动刷新间隔">
                    <option value="15">每 15 秒</option>
                    <option value="30">每 30 秒</option>
                    <option value="60" selected>每 1 分钟</option>
                    <option value="120">每 2 分钟</option>
                    <option value="180">每 3 分钟</option>
                </select>
                <span id="lastAutoRefreshAt" style="color:var(--cyan);font-variant-numeric:tabular-nums;">上次刷新：—</span>
            </div>
            <nav class="nav-pills" aria-label="爬虫看板子页面">
                <a class="nav-pill active" href="{{ url_for('crawler_dashboard') }}">资讯流</a>
                <a class="nav-pill" href="{{ url_for('crawler_dashboard_wordcloud') }}">标题词云</a>
                <a class="nav-pill" href="{{ url_for('timeline_page') }}">🕒 历史时间轴</a>
            </nav>
            <a class="back" href="{{ url_for('index') }}">返回主页</a>
        </div>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="list-head">
                <h3 style="margin:0;">最新抓取数据</h3>
                <div style="display:flex; align-items:center;">
                    <button class="toggle-btn" id="openSidebarBtn">渠道统计</button>
                    <button class="more-btn" id="moreBtn">显示更多</button>
                </div>
            </div>
            <div class="toolbar">
                <input id="searchInput" type="text" placeholder="搜索标题或链接关键词">
                <input id="startTimeInput" type="datetime-local" placeholder="开始时间">
                <input id="endTimeInput" type="datetime-local" placeholder="结束时间">
                <select id="hasLinkSelect">
                    <option value="">链接状态：全部</option>
                    <option value="yes">仅有链接</option>
                    <option value="no">仅无链接</option>
                </select>
                <button class="more-btn" id="applyFilterBtn">筛选</button>
                <button class="more-btn" id="resetFilterBtn">重置</button>
                <button class="more-btn" id="exportBtn">导出 Excel</button>
            </div>
            <div id="currentFilter" style="font-size:12px;color:#8fa3bf;margin-bottom:8px;"></div>
            <div id="latestList"></div>
        </div>
    </div>

    <aside class="sidebar" id="channelSidebar">
        <div class="sidebar-head">
            <h3 style="margin:0;">消息渠道统计（按渠道）</h3>
            <button class="more-btn" id="closeSidebarBtn">关闭</button>
        </div>
        <div id="channelSummary"></div>
    </aside>

    <div class="panel">
        <h3>实时日志</h3>
        <div class="terminal" id="terminalLog"></div>
    </div>
</div>

<div id="toastMsg" class="toast" role="status" aria-live="polite"></div>

<script>
    const CRAWLER_API_BASE = {{ crawler_api_base | tojson }};
    function crawlerApi(suffix) {
        const s = (suffix || '').replace(/^\//, '');
        return CRAWLER_API_BASE + '/' + s;
    }
    /** 避免 404 HTML 被 res.json() 解析时报 Unexpected token '<' */
    async function crawlerFetchJson(url) {
        const res = await fetch(url);
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok) {
            if (ct.includes('application/json')) {
                try {
                    return await res.json();
                } catch (e) {
                    return { success: false, error: 'HTTP ' + res.status };
                }
            }
            const hint = res.status === 404
                ? '（404：进程可能仍为旧版 app，请重启服务以加载 /api/crawler_dashboard/feed_state；若在子路径部署请检查反代）'
                : '';
            return { success: false, error: 'HTTP ' + res.status + hint };
        }
        if (!ct.includes('application/json')) {
            return { success: false, error: '响应非 JSON，可能未登录跳转到了 HTML 页面' };
        }
        return res.json();
    }

    async function timelineApiFetchJson(url, fetchOpts) {
        const res = await fetch(url, fetchOpts || {});
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (!res.ok) {
            if (ct.includes('application/json')) {
                try {
                    return await res.json();
                } catch (e) {
                    return { success: false, error: 'HTTP ' + res.status };
                }
            }
            return { success: false, error: 'HTTP ' + res.status };
        }
        if (!ct.includes('application/json')) {
            return { success: false, error: '响应非 JSON' };
        }
        return res.json();
    }

    function timelineTodayDateStr() {
        return new Date().toISOString().slice(0, 10);
    }

    let toastHideTimer = null;
    function showToast(msg) {
        const el = document.getElementById('toastMsg');
        if (!el) return;
        el.textContent = msg || '';
        el.classList.add('show');
        clearTimeout(toastHideTimer);
        toastHideTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    /**
     * 从资讯发布时间解析 YYYY-MM-DD 与 HH:MM（缺时间则 POST 时由后端填当前时刻）。
     * 使用 DOM 按钮 + 闭包传参，避免 onclick 拼接 title 引号导致 JS 语法错误。
     */
    function extractTimelineDateTime(pubDisp, item) {
        const raw = (item.publish_time || item.crawl_time || '').toString().trim();
        let dateStr = '';
        const dm = raw.match(/^(\d{4}-\d{2}-\d{2})/);
        if (dm) dateStr = dm[1];
        if (!dateStr && raw.length >= 10) dateStr = raw.slice(0, 10);
        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) dateStr = timelineTodayDateStr();
        let timeStr = '';
        const tm = raw.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
        if (tm) timeStr = String(tm[1]).padStart(2, '0') + ':' + tm[2];
        if (!timeStr && pubDisp && pubDisp !== '-') {
            const tm2 = String(pubDisp).match(/(\d{1,2}):(\d{2})/);
            if (tm2) timeStr = String(tm2[1]).padStart(2, '0') + ':' + tm2[2];
        }
        return { dateStr, timeStr };
    }

    async function addToTimeline(date, time, title, url) {
        const body = {
            date: date || timelineTodayDateStr(),
            title: title || '',
            url: url || '',
            remark: '',
        };
        if (time) body.time = time;
        const data = await timelineApiFetchJson('/api/timeline/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (data.success) {
            showToast('已成功加入该日时间轴');
        } else {
            showToast(data.error || '加入时间轴失败');
        }
    }

    let offset = 0;
    const pageSize = 10;
    let hasMore = true;
    let currentSource = '';
    let currentQuery = '';
    let currentStartTime = '';
    let currentEndTime = '';
    let currentHasLink = '';

    /** 与 /latest 共用的筛选项 query（不含 ?） */
    function getFilterQuery() {
        const p = [];
        if (currentSource) p.push('source=' + encodeURIComponent(currentSource));
        if (currentQuery) p.push('q=' + encodeURIComponent(currentQuery));
        if (currentStartTime) p.push('start_time=' + encodeURIComponent(currentStartTime.replace('T', ' ')));
        if (currentEndTime) p.push('end_time=' + encodeURIComponent(currentEndTime.replace('T', ' ')));
        if (currentHasLink) p.push('has_link=' + encodeURIComponent(currentHasLink));
        return p.join('&');
    }

    let feedPollTimer = null;
    let autoRefreshBusy = false;

    /** 定时自动刷新：直接重拉第一页列表 + 渠道统计（与 feed_state 无关，到点必执行） */
    async function autoRefreshTick() {
        if (autoRefreshBusy) return;
        autoRefreshBusy = true;
        try {
            const ok = await loadLatest(true, { silent: true });
            if (ok) {
                await loadChannelSummary({ silent: true });
                const el = document.getElementById('lastAutoRefreshAt');
                if (el) el.textContent = '上次刷新：' + new Date().toLocaleTimeString();
                appendLog('[自动刷新] 已更新列表与渠道统计');
            }
        } finally {
            autoRefreshBusy = false;
        }
    }

    function appendLog(message) {
        const el = document.getElementById('terminalLog');
        const line = document.createElement('div');
        line.className = 'log-line';
        const time = new Date().toLocaleTimeString();
        line.textContent = `[${time}] ${message}`;
        el.appendChild(line);
        while (el.children.length > 200) {
            el.removeChild(el.firstChild);
        }
        el.scrollTop = el.scrollHeight;
    }

    function formatSpan(minTime, maxTime) {
        if (!minTime && !maxTime) return '-';
        if (minTime && maxTime) return `${minTime} ~ ${maxTime}`;
        return minTime || maxTime || '-';
    }

    async function loadChannelSummary(opts) {
        const silent = opts && opts.silent;
        const data = await crawlerFetchJson(crawlerApi('channel_summary'));
        if (!data.success) return;

        const box = document.getElementById('channelSummary');
        const channels = data.channels || [];
        const summary = data.summary || {};

        let html = '<table class="summary-table"><thead><tr>' +
            '<th>消息渠道</th><th>消息时间跨度</th><th>条数</th></tr></thead><tbody>';

        channels.forEach(ch => {
            const source = (ch.source || '-').replace(/"/g, '&quot;');
            html += `<tr><td><a href="#" class="channel-link" data-source="${source}" style="color:#7dd3fc;text-decoration:none;">${ch.source || '-'}</a></td><td>${formatSpan(ch.min_publish_time, ch.max_publish_time)}</td><td>${ch.message_count || 0}</td></tr>`;
        });

        html += '</tbody></table>';
        html += `<div class="summary-total"><span>合计条数：${summary.total_count || 0}</span><span>全量时间跨度：${formatSpan(summary.total_min_publish_time, summary.total_max_publish_time)}</span></div>`;
        html += `<div class="summary-total"><a href="#" id="showAllSource" style="color:#93c5fd;text-decoration:none;">显示全部渠道消息</a></div>`;

        box.innerHTML = html;

        box.querySelectorAll('.channel-link').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                currentSource = a.getAttribute('data-source') || '';
                document.getElementById('channelSidebar').classList.remove('open');
                loadLatest(true);
                updateFilterLabel();
                appendLog(`已切换到渠道过滤：${currentSource || '全部'}`);
            });
        });

        const showAll = document.getElementById('showAllSource');
        if (showAll) {
            showAll.addEventListener('click', (e) => {
                e.preventDefault();
                currentSource = '';
                loadLatest(true);
                updateFilterLabel();
                appendLog('已切换到全部渠道');
            });
        }

        if (!silent) appendLog('渠道统计已更新');
    }

    function updateFilterLabel() {
        const parts = [];
        parts.push(currentSource ? `渠道：${currentSource}` : '渠道：全部');
        if (currentQuery) parts.push(`关键词：${currentQuery}`);
        if (currentStartTime) parts.push(`开始：${currentStartTime}`);
        if (currentEndTime) parts.push(`结束：${currentEndTime}`);
        if (currentHasLink === 'yes') parts.push('链接：仅有链接');
        if (currentHasLink === 'no') parts.push('链接：仅无链接');
        document.getElementById('currentFilter').textContent = `当前筛选：${parts.join(' ｜ ')}`;
    }

    async function loadLatest(reset = false, opts) {
        const silent = opts && opts.silent;
        if (reset) {
            offset = 0;
            hasMore = true;
            document.getElementById('latestList').innerHTML = '';
        }
        if (!hasMore) return false;

        const f = getFilterQuery();
        const sep = f ? '&' : '';
        const data = await crawlerFetchJson(
            crawlerApi(`latest?limit=${pageSize}&offset=${offset}${sep}${f}`)
        );
        if (!data.success) {
            if (silent) appendLog('[自动刷新] 列表请求失败，请检查网络或登录状态');
            return false;
        }

        const box = document.getElementById('latestList');
        (data.items || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            const hasUrl = !!(item.url && String(item.url).trim());
            const linkTag = hasUrl
                ? `<span style="color:#34d399;">[有链接]</span>`
                : `<span style="color:#f59e0b;">[无链接]</span>`;
            const titleHtml = hasUrl
                ? `<a class="item-title" href="${item.url}" target="_blank">${item.title}</a>`
                : `<span class="item-title">${item.title}</span>`;
            const pubDisp = (item.publish_time_display || item.publish_time || item.crawl_time || '-');
            let day = '';
            const rawT = (item.publish_time || item.crawl_time || '').toString();
            if (rawT.length >= 10) day = rawT.slice(0, 10);
            if (!day) day = new Date().toISOString().slice(0, 10);
            const calHref = '/calendar/add?title=' + encodeURIComponent(item.title || '') + '&date=' + encodeURIComponent(day) + '&source_url=' + encodeURIComponent(item.url || '') + '&return_to=crawler';
            const planDesc = (item.url || '').trim() ? ('来源链接：' + String(item.url).trim()) : (item.title || '');
            const planHref = '/plans/add?title=' + encodeURIComponent(item.title || '') + '&description=' + encodeURIComponent(planDesc) + '&return_to=crawler';
            div.innerHTML = `${titleHtml}<div class="item-meta">${linkTag} ｜ 来源：${item.source} ｜ 发布时间：${pubDisp} ｜ 抓取时间：${item.crawl_time || '-'}</div>`;
            const actions = document.createElement('div');
            actions.className = 'item-actions';
            const aCal = document.createElement('a');
            aCal.href = calHref;
            aCal.textContent = '+ 记入日历';
            const aPlan = document.createElement('a');
            aPlan.href = planHref;
            aPlan.textContent = '+ 转为计划';
            const tlBtn = document.createElement('button');
            tlBtn.type = 'button';
            tlBtn.className = 'btn-timeline-add';
            tlBtn.textContent = '+ 加入时间轴';
            const tlDt = extractTimelineDateTime(pubDisp, item);
            tlBtn.addEventListener('click', () => {
                addToTimeline(tlDt.dateStr, tlDt.timeStr, item.title || '', (item.url || '').trim());
            });
            actions.appendChild(aCal);
            actions.appendChild(aPlan);
            actions.appendChild(tlBtn);
            div.appendChild(actions);
            box.appendChild(div);
        });

        offset += (data.items || []).length;
        hasMore = !!data.has_more;
        document.getElementById('moreBtn').style.display = hasMore ? 'inline-block' : 'none';
        if (!silent) appendLog(`最新数据加载 ${data.items ? data.items.length : 0} 条`);
        return true;
    }

    async function refreshAll() {
        await Promise.all([loadChannelSummary()]);
    }

    document.getElementById('moreBtn').addEventListener('click', () => loadLatest(false));
    document.getElementById('openSidebarBtn').addEventListener('click', () => {
        document.getElementById('channelSidebar').classList.add('open');
    });
    document.getElementById('closeSidebarBtn').addEventListener('click', () => {
        document.getElementById('channelSidebar').classList.remove('open');
    });

    document.getElementById('applyFilterBtn').addEventListener('click', () => {
        currentQuery = (document.getElementById('searchInput').value || '').trim();
        currentStartTime = document.getElementById('startTimeInput').value || '';
        currentEndTime = document.getElementById('endTimeInput').value || '';
        currentHasLink = document.getElementById('hasLinkSelect').value || '';
        updateFilterLabel();
        loadLatest(true);
        appendLog('已应用搜索/筛选条件');
    });

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('startTimeInput').value = '';
        document.getElementById('endTimeInput').value = '';
        document.getElementById('hasLinkSelect').value = '';
        currentQuery = '';
        currentStartTime = '';
        currentEndTime = '';
        currentHasLink = '';
        updateFilterLabel();
        loadLatest(true);
        appendLog('已重置筛选条件');
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const sourceName = currentSource ? currentSource.replace(/\s+/g, '_') : 'all';
        const exportName = `crawler_news_${sourceName}_${y}${m}${d}_${hh}${mm}${ss}`;
        const f = getFilterQuery();
        const exportParam = 'export_name=' + encodeURIComponent(exportName);
        const qs = f ? f + '&' + exportParam : exportParam;
        window.open(crawlerApi('export?' + qs), '_blank');
        appendLog(`已触发 Excel 导出：${exportName}.xlsx`);
    });

    ['searchInput', 'startTimeInput', 'endTimeInput'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('applyFilterBtn').click();
            }
        });
    });

    function scheduleFeedPoll(runImmediate) {
        if (feedPollTimer) {
            clearInterval(feedPollTimer);
            feedPollTimer = null;
        }
        const toggle = document.getElementById('autoRefreshToggle');
        const sel = document.getElementById('autoRefreshInterval');
        if (!toggle || !sel || !toggle.checked) return;
        const sec = parseInt(sel.value, 10);
        if (!sec || sec < 1) return;
        feedPollTimer = setInterval(autoRefreshTick, sec * 1000);
        if (runImmediate) autoRefreshTick();
    }

    document.getElementById('autoRefreshToggle').addEventListener('change', () => scheduleFeedPoll(true));
    document.getElementById('autoRefreshInterval').addEventListener('change', () => scheduleFeedPoll(true));

    (async function boot() {
        updateFilterLabel();
        await loadLatest(true);
        await refreshAll();
        const el = document.getElementById('lastAutoRefreshAt');
        if (el) el.textContent = '上次刷新：' + new Date().toLocaleTimeString();
        scheduleFeedPoll(false);
    })();
</script>
{% endblock %}
