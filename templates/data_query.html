        // 股票搜索（优化性能，添加缓存）
        window.handleStockSearch = function(query) {
            if (!query) {
                query = '';
            }
            
            clearTimeout(searchTimeout);
            const queryTrimmed = query.trim();
            
            const resultsDiv = document.getElementById('stock-results');
            if (!resultsDiv) {
                console.error('stock-results 元素未找到');
                return;
            }
            
            if (!queryTrimmed || queryTrimmed.length < 1) {
                resultsDiv.classList.remove('active');
                return;
            }
            
            // 先尝试从内存缓存（搜索缓存）获取
            const cacheKey = queryTrimmed.toLowerCase();
            if (stockSearchCache.has(cacheKey)) {
                const cachedResults = stockSearchCache.get(cacheKey);
                displayStockResults(cachedResults);
                return;
            }
            
            // 如果所有股票列表已缓存，先从缓存中搜索（本地过滤）
            if (allStocksCache && allStocksCache.length > 0) {
                const queryLower = queryTrimmed.toLowerCase();
                const filteredStocks = allStocksCache.filter(stock => {
                    const code = (stock.code || '').toLowerCase();
                    const name = (stock.name || '').toLowerCase();
                    return code.includes(queryLower) || name.includes(queryLower);
                }).slice(0, 50); // 限制最多返回50条
                
                if (filteredStocks.length > 0) {
                    // 缓存搜索结果
                    if (stockSearchCache.size >= MAX_CACHE_SIZE) {
                        const firstKey = stockSearchCache.keys().next().value;
                        stockSearchCache.delete(firstKey);
                    }
                    stockSearchCache.set(cacheKey, filteredStocks);
                    displayStockResults(filteredStocks);
                    return;
                }
            }
            
            // 如果缓存中没有结果，或者缓存未加载，调用API搜索
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch('/api/data_query/search_stock', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: queryTrimmed })
                    });
                    
                    const data = await response.json();
                    if (data.success && data.stocks && data.stocks.length > 0) {
                        // 缓存结果
                        if (stockSearchCache.size >= MAX_CACHE_SIZE) {
                            // 删除最旧的缓存（FIFO）
                            const firstKey = stockSearchCache.keys().next().value;
                            stockSearchCache.delete(firstKey);
                        }
                        stockSearchCache.set(cacheKey, data.stocks);
                        
                        displayStockResults(data.stocks);
                    } else {
                        // 没有结果时也显示提示
                        const resultsDiv = document.getElementById('stock-results');
                        if (resultsDiv) {
                            resultsDiv.innerHTML = '<div class="search-result-item" style="color: rgba(255,255,255,0.6); text-align: center; padding: 12px;">未找到匹配的股票</div>';
                            resultsDiv.classList.add('active');
                        }
                    }
                } catch (error) {
                    console.error('搜索股票失败:', error);
                    const resultsDiv = document.getElementById('stock-results');
                    if (resultsDiv) {
                        resultsDiv.innerHTML = '<div class="search-result-item" style="color: #ef4444; text-align: center; padding: 12px;">搜索失败，请重试</div>';
                        resultsDiv.classList.add('active');
                    }
                }
            }, 150);
        };

        // 执行查询
        async function executeQuery(event) {

                // 构建多表查询数据

        // 存储查询结果数据
        let currentQueryResult = null;
        let currentQueryDimension = null; // 记录当前查询使用的维度: 'stock', 'industry', 'concept', null
        // 分页与表格共用（表/字段、SQL模板、筛选任务结果）
        let currentResultData = [];
        let currentResultColumns = [];
        let currentResultCount = 0;
        let currentPageSize = 50;

        // 筛选任务多 sheet
        let currentScreeningResultData = {};

        function normColumns(cols) {
            return (cols || []).map(c => typeof c === 'string' ? { field: c, display: c } : c);
        }
        
        function buildTableWithPaginationHtml(data, columns, count, pageSize, page) {
            if (!data || count === 0) return '<div style="color: rgba(255,255,255,0.6); text-align: center; padding: 40px;">未查询到数据</div>';
            const totalPages = Math.max(1, Math.ceil(count / pageSize));
            const start = (page - 1) * pageSize;
            const slice = data.slice(start, start + pageSize);
            let html = '<div class="table-wrapper" style="margin-top: 16px;"><table class="data-table"><thead><tr>';
            columns.forEach(col => { html += `<th>${((col && col.display) || (col && col.field) || col || '').toString()}</th>`; });
            html += '</tr></thead><tbody>';
            slice.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    const f = (col && col.field) || col;
                    let v = row[f];
                    if (v === null || v === undefined) v = '-';
                    else if (typeof v === 'number') v = v.toLocaleString();
                    else if (typeof v === 'object' && !(v instanceof Date)) { try { v = JSON.stringify(v); } catch(e){} if (v.length > 100) v = v.substring(0, 100) + '...'; }
                    else if (typeof v === 'string' && v.length > 100) v = v.substring(0, 100) + '...';
                    html += `<td>${v}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            html += '<div class="pagination-bar" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding: 12px 0;">';
            html += `<span style="color: rgba(255,255,255,0.7);">第 ${page} / 共 ${totalPages} 页</span>`;
            html += '<div style="display: flex; gap: 8px;">';
            html += `<button type="button" onclick="changePage(${page - 1})" ${page <= 1 ? 'disabled' : ''} style="padding: 8px 16px; background: rgba(99, 102, 241, 0.3); border: 1px solid rgba(99, 102, 241, 0.5); color: #fff; border-radius: 8px; cursor: pointer;">上一页</button>`;
            html += `<button type="button" onclick="changePage(${page + 1})" ${page >= totalPages ? 'disabled' : ''} style="padding: 8px 16px; background: rgba(99, 102, 241, 0.3); border: 1px solid rgba(99, 102, 241, 0.5); color: #fff; border-radius: 8px; cursor: pointer;">下一页</button>`;
            html += '</div></div></div>';
            return html;
        }
        
        function updateResultsTableContainer() {
            const el = document.getElementById('results-table-container');
            if (!el) return;
            el.innerHTML = buildTableWithPaginationHtml(currentResultData, currentResultColumns, currentResultCount, currentPageSize, currentPage);
        }
        
        function changePage(p) {
            const total = Math.max(1, Math.ceil(currentResultCount / currentPageSize));
            if (p < 1 || p > total) return;
            currentPage = p;
            updateResultsTableContainer();
        }
        
        function changePageSize(s) {
            currentPageSize = s;
            currentPage = 1;
            const sel = document.getElementById('results-page-size');

        }
        window.changePage = changePage;

        // 显示查询结果（表/字段、SQL模板）

            [20, 50, 100, 200].forEach(n => { html += `<option value="${n}" ${currentPageSize === n ? 'selected' : ''}>${n}</option>`; });
            html += '</select> 条</div>';

            if (result.sql) html += '<button type="button" onclick="toggleSQLView()" id="sql-toggle-btn" style="width: auto; padding: 12px 24px; background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; border-radius: 8px; cursor: pointer; font-weight: 600;">🔍 查看SQL</button>';
            html += '</div></div>';
            if (result.sql) {
                html += `<div id="sql-view-container" style="display: none; margin-top: 24px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px;">`;
                html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;"><h4 style="color: #ffffff; margin: 0; font-size: 16px; font-weight: 600;">执行的SQL语句</h4>';
                html += '<button type="button" onclick="copySQL()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; color: #ffffff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;">📋 复制SQL</button></div>';
                html += `<pre id="sql-content" style="background: #1a1a2e; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 16px; color: #10b981; font-family: "Courier New", monospace; font-size: 13px; line-height: 1.6; overflow-x: auto; margin: 0; white-space: pre-wrap; word-wrap: break-word;">${escapeHtml(result.sql)}</pre></div>`;
            }
            html += '<div id="charts-container" style="margin-top: 32px;"></div>';
            html += '<div id="results-table-container">' + buildTableWithPaginationHtml(data, cols, count, currentPageSize, currentPage) + '</div>';
            resultsContent.innerHTML = html;
        }
        
        // ---------- 筛选任务结果：历史、加载、多 sheet、分页、图表 ----------
        // 检查日期是否是今天
        function isToday(dateStr) {
            if (!dateStr) return false;
            try {
                const date = new Date(dateStr);
                const today = new Date();
                return date.toDateString() === today.toDateString();
            } catch (e) {
                return false;
            }
        }
        
        // 格式化日期显示
        function formatDateShort(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (date.toDateString() === today.toDateString()) {
                    return '今天';
                } else if (date.toDateString() === yesterday.toDateString()) {
                    return '昨天';
                } else {
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    return `${month}-${day}`;
                }
            } catch (e) {
                return '';
            }
        }

        window.switchScreeningSheet = switchScreeningSheet;
        window.switchScreeningSheetByIndex = switchScreeningSheetByIndex;
        
        function renderScreeningResultsSheet() {

            const arr = (rd && Array.isArray(rd)) ? rd : [];
            const cols = arr.length && arr[0] ? Object.keys(arr[0]).map(k => ({ field: k, display: k })) : [];

            currentResultColumns = cols;
            currentResultCount = arr.length;

            const meta = currentScreeningResultMeta || {};
            const resultsContent = document.getElementById('results-content');
            let html = '<div class="results-header">';
            html += `<h3>${meta.task_name || '筛选结果'} — ${currentScreeningSheet}</h3>`;

                html += `<div style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px;">文件修改时间: ${meta.file_mtime}</div>`;
            }
            if (meta.total_rows !== undefined) {

            if (currentScreeningResultMeta && currentScreeningResultMeta.id) {
                html += `<a href="/api/screening_tasks/download/${currentScreeningResultMeta.id}" target="_blank" style="padding: 10px 18px; background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.5); color: #10b981; border-radius: 8px; text-decoration: none; font-weight: 600;">📥 下载 Excel</a>`;
            }
            html += '</div></div>';
            html += '<div id="charts-container" style="margin-top: 24px;"></div>';
            html += '<div id="results-table-container">' + buildTableWithPaginationHtml(arr, cols, arr.length, currentPageSize, currentPage) + '</div>';
            resultsContent.innerHTML = html;
        }
        
        function displayScreeningResults(res) {
            // 检查是否有错误
            if (res.error) {
                const resultsContent = document.getElementById('results-content');
                resultsContent.innerHTML = `<div class="error" style="padding: 24px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px; color: #ef4444;">
                    <h3 style="margin-top: 0; color: #ef4444;">加载失败</h3>
                    <p>${res.error}</p>
                    ${res.output_file_path ? `<p style="font-size: 12px; color: rgba(239, 68, 68, 0.7); margin-top: 8px;">文件路径: ${res.output_file_path}</p>` : ''}
                </div>`;
                return;
            }
            
            const rd = res.result_data || {};
            currentScreeningResultData = rd;
            currentScreeningResultMeta = res;
            const names = Object.keys(rd);
            currentScreeningSheet = names[0] || '';
            currentPage = 1;
            
            if (names.length === 0) {
                document.getElementById('results-content').innerHTML = '<div class="results-header"><h3>' + (res.task_name || '筛选结果') + '</h3></div><div style="color: rgba(255,255,255,0.6); text-align: center; padding: 40px;">暂无结果数据</div>';
                return;
            }
            
            // 验证数据有效性
            let hasValidData = false;
            for (const sheetName of names) {
                if (rd[sheetName] && Array.isArray(rd[sheetName]) && rd[sheetName].length > 0) {
                    hasValidData = true;
                    break;
                }
            }
            
            if (!hasValidData) {
                document.getElementById('results-content').innerHTML = '<div class="results-header"><h3>' + (res.task_name || '筛选结果') + '</h3></div><div style="color: rgba(255,255,255,0.6); text-align: center; padding: 40px;">所有Sheet都没有数据</div>';
                return;
            }
            
            renderScreeningResultsSheet();
        }
        
        // 打开图表配置模态框
        function openChartConfigModal() {
            if (!currentQueryResult || !currentQueryResult.data || currentQueryResult.data.length === 0) {
                alert('请先执行查询并获取数据');
                return;
            }
            
            const modal = document.getElementById('chart-config-modal');
            modal.style.display = 'flex';
            modal.classList.add('active');
            
            // 初始化图表配置（默认一个图表）
            initChartConfig();
        }
        
        // 关闭图表配置模态框
        function closeChartConfigModal() {
            const modal = document.getElementById('chart-config-modal');
            modal.style.display = 'none';
            modal.classList.remove('active');
        }
        
        // 图表配置数组
        let chartConfigs = [];
        
        // 检测可用的汇总维度（基于查询时选择的维度）
        function detectAvailableGroupDimensions() {
            const dimensions = [];
            
            // 检测当前选择了哪些维度（从页面元素检测）
            const stockChecked = document.getElementById('dimension-stock')?.checked || false;
            const conceptChecked = document.getElementById('dimension-concept')?.checked || false;
            const industryChecked = document.getElementById('dimension-industry')?.checked || false;
            
            // 如果有明确的查询维度，使用它；否则从页面元素检测
            const queryDimension = currentQueryDimension || 
                (industryChecked ? 'industry' : conceptChecked ? 'concept' : stockChecked ? 'stock' : null);
            
            console.log('查询维度检测:', {
                currentQueryDimension,
                stockChecked,
                conceptChecked,
                industryChecked,
                finalDimension: queryDimension
            });
            
            // 查找实际存在的字段（用于汇总时确定字段名）
            const findField = (patterns) => {
                if (!currentQueryResult || !currentQueryResult.columns) return null;
                for (const pattern of patterns) {
                    const field = currentQueryResult.columns.find(col => {
                        const fieldName = col.field || '';
                        const fieldLower = fieldName.toLowerCase();
                        return pattern.some(p => {
                            const pLower = p.toLowerCase();
                            return fieldLower === pLower || fieldLower.includes(pLower);
                        });
                    });
                    if (field) return field;
                }
                return null;
            };
            
            // 根据查询维度显示汇总选项（即使字段不存在也显示，用户可以确保字段存在）
            // 1. 如果选择了行业维度，显示行业汇总选项
            if (industryChecked || queryDimension === 'industry') {
                // 查找行业字段，如果存在则使用，否则使用默认字段名
                const thirdIndustryField = findField([
                    ['thirdindustryname', 'ThirdIndustryName'],
                    ['thirdindustry', 'ThirdIndustry'],
                    ['三级行业']
                ]);
                dimensions.push({ 
                    value: 'third_industry', 
                    label: '按三级行业汇总', 
                    field: thirdIndustryField ? thirdIndustryField.field : 'ThirdIndustryName' 
                });
                
                const secondIndustryField = findField([
                    ['secondindustryname', 'SecondIndustryName'],
                    ['secondindustry', 'SecondIndustry'],
                    ['二级行业']
                ]);
                dimensions.push({ 
                    value: 'second_industry', 
                    label: '按二级行业汇总', 
                    field: secondIndustryField ? secondIndustryField.field : 'SecondIndustryName' 
                });
                
                const firstIndustryField = findField([
                    ['firstindustryname', 'FirstIndustryName'],
                    ['firstindustry', 'FirstIndustry'],
                    ['一级行业']
                ]);
                dimensions.push({ 
                    value: 'first_industry', 
                    label: '按一级行业汇总', 
                    field: firstIndustryField ? firstIndustryField.field : 'FirstIndustryName' 
                });
            }
            
            // 2. 如果选择了概念股维度，显示概念股汇总选项（或总是显示，让用户可以选择）
            if (conceptChecked || queryDimension === 'concept' || queryDimension === null) {
                const conceptField = findField([
                    ['conceptname', 'ConceptName'],
                    ['concept', 'Concept'],
                    ['概念名称', '概念股']
                ]);
                dimensions.push({ 
                    value: 'concept', 
                    label: '按概念股汇总', 
                    field: conceptField ? conceptField.field : 'ConceptName' 
                });
            }
            
            // 3. 如果选择了个股维度，显示个股汇总选项
            if (stockChecked || queryDimension === 'stock' || (!industryChecked && !conceptChecked)) {
                const stockCodeField = findField([
                    ['stockcode', 'StockCode', 'SecuCode'],
                    ['securities', 'Securities'],
                    ['股票代码', '证券代码']
                ]);
                dimensions.push({ 
                    value: 'stock', 
                    label: '按个股汇总', 
                    field: stockCodeField ? stockCodeField.field : 'StockCode' 
                });
            }
            
            // 4. 检测日期字段（用于按日期汇总，通用选项）
            if (currentQueryResult && currentQueryResult.columns) {
                const dateField = findField([
                    ['date', 'Date', 'TradingDay', 'EndDate'],
                    ['day', 'Day'],
                    ['time', 'Time'],
                    ['日期', '交易日期', '报告期']
                ]);
                if (dateField) {
                    dimensions.push({ 
                        value: 'date', 
                        label: '按日期汇总', 
                        field: dateField.field 
                    });
                }
            }
            
            console.log('检测到的汇总维度:', dimensions);
            return dimensions;
        }
        
        // 初始化图表配置
        function initChartConfig() {
            // 自动检测默认X轴字段（日期字段优先）
            let defaultXAxisField = null;
            if (currentQueryResult && currentQueryResult.columns) {
                const dateFields = currentQueryResult.columns.filter(col => 
                    col.field.toLowerCase().includes('date') || 
                    col.field.toLowerCase().includes('day') ||
                    col.field.toLowerCase().includes('time')
                );
                if (dateFields.length > 0) {
                    defaultXAxisField = dateFields[0].field;
                } else if (currentQueryResult.columns.length > 0) {
                    defaultXAxisField = currentQueryResult.columns[0].field;
                }
            }
            
            chartConfigs = [{
                id: Date.now(),
                title: '图表 1',
                xAxisField: defaultXAxisField,
                yAxisFields: [],
                chartType: 'line'
            }];
            renderChartConfigs();
        }
        
        // 添加图表配置
        function addChartConfig() {
            // 自动检测X轴字段（日期字段优先）
            let defaultXAxisField = null;
            if (currentQueryResult && currentQueryResult.columns) {
                const dateFields = currentQueryResult.columns.filter(col => 
                    col.field.toLowerCase().includes('date') || 
                    col.field.toLowerCase().includes('day') ||
                    col.field.toLowerCase().includes('time')
                );
                if (dateFields.length > 0) {
                    defaultXAxisField = dateFields[0].field;
                } else if (currentQueryResult.columns.length > 0) {
                    defaultXAxisField = currentQueryResult.columns[0].field;
                }
            }
            
            chartConfigs.push({
                id: Date.now(),
                title: `图表 ${chartConfigs.length + 1}`,
                xAxisField: defaultXAxisField,
                yAxisFields: [],
                chartType: 'line'
            });
            renderChartConfigs();
        }
        
        // 切换Y轴字段选择
        function toggleYAxisField(chartId, fieldName, checked) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (!chart) {
                console.error(`找不到图表配置: ${chartId}`);
                return;
            }
            
            if (!chart.yAxisFields) {
                chart.yAxisFields = [];
            }
            
            if (checked) {
                if (!chart.yAxisFields.includes(fieldName)) {
                    chart.yAxisFields.push(fieldName);
                    console.log(`图表 ${chartId} Y轴字段已添加: ${fieldName}, 当前Y轴字段:`, chart.yAxisFields);
                }
            } else {
                chart.yAxisFields = chart.yAxisFields.filter(f => f !== fieldName);
                console.log(`图表 ${chartId} Y轴字段已移除: ${fieldName}, 当前Y轴字段:`, chart.yAxisFields);
            }
        }
        window.toggleYAxisField = toggleYAxisField;
        
        // 更新图表类型
        function updateChartType(chartId, chartType) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (chart) {
                chart.chartType = chartType;
            }
        }
        window.updateChartType = updateChartType;
        
        // 更新图表汇总维度
        function updateChartGroupBy(chartId, groupBy) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (chart) {
                chart.groupBy = groupBy;
            }
        }
        window.updateChartGroupBy = updateChartGroupBy;
        
        // 更新图表X轴字段
        function updateChartXAxis(chartId, xAxisField) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (chart) {
                chart.xAxisField = xAxisField;
                console.log(`图表 ${chartId} X轴字段已更新为: ${xAxisField}`);
            }
        }
        window.updateChartXAxis = updateChartXAxis;
        
        // 删除图表配置
        function removeChartConfig(chartId) {
            chartConfigs = chartConfigs.filter(c => c.id !== chartId);
            renderChartConfigs();
        }
        
        // 添加字段到图表
        function addFieldToChart(chartId) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (!chart) return;
            
            chart.fields.push({
                field: '',
                chartType: 'line',
                color: getRandomColor()
            });
            renderChartConfigs();
        }
        
        // 删除字段
        function removeFieldFromChart(chartId, fieldIndex) {
            const chart = chartConfigs.find(c => c.id === chartId);
            if (!chart) return;
            
            chart.fields.splice(fieldIndex, 1);
            renderChartConfigs();
        }
        
        // 渲染图表配置界面
        function renderChartConfigs() {
            const container = document.getElementById('charts-config-container');
            container.innerHTML = '';
            
            chartConfigs.forEach((chart, chartIndex) => {
                const card = document.createElement('div');
                card.className = 'chart-config-card';
                card.style.cssText = 'background: rgba(26, 26, 46, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 24px; margin-bottom: 20px;';
                
                // 生成X轴字段选项（优先显示日期字段）
                let xAxisOptions = '';
                if (currentQueryResult && currentQueryResult.columns) {
                    // 分离日期字段和其他字段
                    const dateFields = currentQueryResult.columns.filter(col => 
                        col.field.toLowerCase().includes('date') || 
                        col.field.toLowerCase().includes('day') ||
                        col.field.toLowerCase().includes('time')
                    );
                    const otherFields = currentQueryResult.columns.filter(col => 
                        !col.field.toLowerCase().includes('date') && 
                        !col.field.toLowerCase().includes('day') &&
                        !col.field.toLowerCase().includes('time')
                    );
                    
                    // 如果没有默认X轴字段，自动选择第一个日期字段
                    if (!chart.xAxisField && dateFields.length > 0) {

                    } else if (!chart.xAxisField && otherFields.length > 0) {
                        chart.xAxisField = otherFields[0].field;
                        console.log(`自动设置X轴字段为: ${chart.xAxisField}`);
                    }
                    
                    if (dateFields.length > 0) {
                        xAxisOptions += '<optgroup label="📅 日期字段">';
                        dateFields.forEach(col => {
                            const isSelected = chart.xAxisField === col.field;
                            xAxisOptions += `<option value="${col.field}" ${isSelected ? 'selected' : ''}>${col.display || col.field}</option>`;
                        });
                        xAxisOptions += '</optgroup>';
                    }
                    
                    if (otherFields.length > 0) {
                        xAxisOptions += '<optgroup label="📊 其他字段">';
                        otherFields.forEach(col => {
                            const isSelected = chart.xAxisField === col.field;
                            xAxisOptions += `<option value="${col.field}" ${isSelected ? 'selected' : ''}>${col.display || col.field}</option>`;

                                   onmouseover="if(!this.style.background.includes('0.3')) this.style.background='rgba(255,255,255,0.1)'"

                                <input type="checkbox" value="${col.field}" data-chart-id="${chart.id}" ${isSelected ? 'checked' : ''} 
                                       onchange="toggleYAxisField(${chart.id}, '${col.field}', this.checked); console.log('Y轴字段切换:', '${col.field}', this.checked);"
                                       style="margin-right: 12px; cursor: pointer; width: 18px; height: 18px; accent-color: #ec4899;">
                                <span style="flex: 1;">${col.display || col.field}</span>

        // 获取随机颜色
        function getRandomColor() {
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#84cc16'];

        // 存储图表实例
        let chartInstances = [];
        
        // 根据汇总维度聚合数据
        function aggregateDataByDimension(data, groupBy, xAxisField, valueFields) {
            if (!groupBy || groupBy === 'none') {
                // 不汇总，返回原始数据
                return {
                    labels: data.map(row => {
                        const value = row[xAxisField];
                        if (value && typeof value === 'string' && value.match(/^\d{4}-\d{2}-\d{2}/)) {
                            return value.substring(0, 10);
                        }
                        return value || '';
                    }),
                    aggregatedData: data
                };
            }
            
            const availableDimensions = detectAvailableGroupDimensions();
            const dimension = availableDimensions.find(d => d.value === groupBy);
            if (!dimension) {
                // 维度不存在，返回原始数据
                return {
                    labels: data.map(row => row[xAxisField] || ''),
                    aggregatedData: data
                };
            }
            
            // 查找分组字段
            let groupField = dimension.field;
            if (groupBy === 'date') {
                // 日期汇总需要找到实际的日期字段
                groupField = xAxisField;
            } else {
                // 查找实际的字段名（可能需要匹配不同的命名方式）
                const possibleFields = currentQueryResult.columns.map(col => col.field);
                if (!groupField || !possibleFields.includes(groupField)) {
                    // 尝试模糊匹配
                    const matchedField = possibleFields.find(f => 
                        f.toLowerCase().includes(groupField.toLowerCase()) ||
                        f.toLowerCase().includes(dimension.value.replace('_', ''))
                    );
                    if (matchedField) {
                        groupField = matchedField;
                    } else {
                        console.warn(`无法找到分组字段: ${dimension.field}，使用原始数据`);
                        return {
                            labels: data.map(row => row[xAxisField] || ''),
                            aggregatedData: data
                        };
                    }
                }
            }
            
            // 按分组字段和X轴字段分组
            const grouped = {};
            data.forEach(row => {
                const groupKey = groupBy === 'date' 
                    ? (row[xAxisField] ? String(row[xAxisField]).substring(0, 10) : '') 
                    : String(row[groupField] || '未知');
                const xKey = row[xAxisField] ? String(row[xAxisField]).substring(0, 10) : '';
                const combinedKey = `${groupKey}|${xKey}`;
                
                if (!grouped[combinedKey]) {
                    grouped[combinedKey] = {
                        group: groupKey,
                        xValue: xKey,
                        rows: [],
                        sums: {}
                    };
                }
                
                grouped[combinedKey].rows.push(row);
                
                // 累加数值字段
                valueFields.forEach(field => {
                    const value = parseFloat(row[field]);
                    if (!isNaN(value)) {
                        grouped[combinedKey].sums[field] = (grouped[combinedKey].sums[field] || 0) + value;
                    }
                });
            });
            
            // 转换为数组并按X轴值排序
            const aggregatedData = Object.values(grouped).sort((a, b) => {
                return a.xValue.localeCompare(b.xValue);
            });
            
            // 提取唯一的X轴标签（按日期排序）
            const uniqueXValues = [...new Set(aggregatedData.map(item => item.xValue))].sort();
            
            return {
                labels: uniqueXValues,
                aggregatedData: aggregatedData,
                groups: [...new Set(aggregatedData.map(item => item.group))].sort()
            };
        }
        
        // 生成图表
        function generateCharts() {
            // 验证配置
            const invalidCharts = [];
            for (let i = 0; i < chartConfigs.length; i++) {
                const chart = chartConfigs[i];
                const issues = [];
                
                if (!chart.xAxisField) {
                    issues.push('未选择X轴字段');
                }
                if (!chart.yAxisFields || chart.yAxisFields.length === 0) {
                    issues.push('未选择Y轴字段');
                }
                
                if (issues.length > 0) {
                    invalidCharts.push(`图表 ${i + 1} (${chart.title || '未命名'}): ${issues.join(', ')}`);
                }
            }
            
            if (invalidCharts.length > 0) {
                alert('请完善以下图表的配置：\n\n' + invalidCharts.join('\n'));
                return;
            }
            
            // 调试信息
            console.log('开始生成图表，配置:', chartConfigs.map(c => ({
                title: c.title,
                xAxis: c.xAxisField,
                yAxis: c.yAxisFields,
                type: c.chartType
            })));
            
            // 清除之前的图表
            chartInstances.forEach(chart => {
                if (chart) chart.destroy();
            });
            chartInstances = [];
            
            // 生成每个图表
            const chartsContainer = document.getElementById('charts-container');
            chartsContainer.innerHTML = '';
            
            chartConfigs.forEach((chartConfig, chartIndex) => {
                // 验证配置
                if (!chartConfig.xAxisField) {
                    console.warn(`图表 ${chartConfig.title} 未设置X轴字段`);
                    return;
                }
                
                if (!chartConfig.yAxisFields || chartConfig.yAxisFields.length === 0) {
                    console.warn(`图表 ${chartConfig.title} 未设置Y轴字段`);
                    return;
                }
                
                const xAxisField = chartConfig.xAxisField;
                const yAxisFields = chartConfig.yAxisFields;
                
                // 检测Y轴字段是否是季度数据（通过字段名判断）
                const isQuarterlyData = yAxisFields.some(field => {
                    const fieldLower = field.toLowerCase();
                    return fieldLower.includes('balance') || 
                           fieldLower.includes('资产负债表') ||
                           fieldLower.includes('income') ||
                           fieldLower.includes('利润表') ||
                           fieldLower.includes('cashflow') ||
                           fieldLower.includes('现金流量表') ||
                           fieldLower.includes('financial') ||
                           fieldLower.includes('财务');
                });
                
                // 按X轴字段分组，对Y轴字段求和
                const grouped = {};
                currentQueryResult.data.forEach(row => {
                    // 格式化X轴值
                    let xKey = '';
                    if (row[xAxisField]) {
                        const xValue = String(row[xAxisField]);
                        if (xValue.match(/^\d{4}-\d{2}-\d{2}/)) {
                            xKey = xValue.substring(0, 10);
                        } else if (xValue.match(/^\d{8}/)) {
                            xKey = xValue.substring(0, 4) + '-' + xValue.substring(4, 6) + '-' + xValue.substring(6, 8);
                        } else {
                            xKey = xValue;
                        }
                    }
                    
                    // 检查该行是否有有效的Y轴数据
                    let hasValidData = false;
                    const rowSums = {};
                    
                    yAxisFields.forEach(field => {
                        const value = parseFloat(row[field]);
                        if (!isNaN(value) && value !== null && value !== undefined) {
                            rowSums[field] = value;
                            hasValidData = true;
                        }
                    });
                    
                    // 如果是季度数据，只处理有有效数据的行
                    // 如果是日度数据，也处理有有效数据的行（但允许累加）
                    if (hasValidData) {
                        if (!grouped[xKey]) {
                            grouped[xKey] = {
                                xValue: xKey,
                                sums: {},
                                hasData: false
                            };
                        }
                        
                        // 累加Y轴字段
                        yAxisFields.forEach(field => {
                            if (rowSums[field] !== undefined) {
                                grouped[xKey].sums[field] = (grouped[xKey].sums[field] || 0) + rowSums[field];
                                grouped[xKey].hasData = true;
                            }
                        });
                    }
                });
                
                // 转换为数组并按X轴值排序
                // 对于季度数据，只保留有实际数据的日期点
                let aggregatedData = Object.values(grouped);
                
                if (isQuarterlyData) {
                    // 过滤掉没有数据的日期点
                    aggregatedData = aggregatedData.filter(item => item.hasData);
                }
                
                aggregatedData = aggregatedData.sort((a, b) => {
                    if (a.xValue.match(/^\d{4}-\d{2}-\d{2}/) && b.xValue.match(/^\d{4}-\d{2}-\d{2}/)) {
                        return a.xValue.localeCompare(b.xValue);
                    }
                    return a.xValue.localeCompare(b.xValue);
                });
                
                // 提取X轴标签（只包含有数据的日期点）
                const labels = aggregatedData.map(item => item.xValue);
                
                // 创建图表容器
                const chartDiv = document.createElement('div');
                chartDiv.className = 'chart-container';
                chartDiv.innerHTML = `<div class="chart-title">${chartConfig.title}</div><canvas id="chart-${chartConfig.id}"></canvas>`;
                chartsContainer.appendChild(chartDiv);
                
                // 准备数据集：每个Y轴字段一条线
                const datasets = [];
                const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#84cc16'];
                const chartType = chartConfig.chartType || 'line';
                
                // 对于季度数据，需要构建只包含有效数据点的标签和数据
                // 收集所有有数据的日期点（所有字段的并集）
                const validDatesSet = new Set();
                const finalDataMap = {}; // 存储每个字段的有效数据点
                
                yAxisFields.forEach((field, fieldIndex) => {
                    const column = currentQueryResult.columns.find(col => col.field === field);
                    if (!column) return;
                    
                    // 从汇总数据中提取该字段的值
                    const fieldData = [];
                    const fieldLabels = [];
                    
                    aggregatedData.forEach(item => {
                        const value = item.sums[field];
                        // 只包含有效数据（非null、非undefined、非NaN）
                        if (value !== undefined && value !== null && !isNaN(value)) {
                            // 对于季度数据，过滤掉0值（如果所有字段都是0，可能是无效数据）
                            if (isQuarterlyData && value === 0) {
                                const allZero = yAxisFields.every(f => !item.sums[f] || item.sums[f] === 0);
                                if (allZero) {
                                    return; // 跳过这个数据点
                                }
                            }
                            fieldData.push(value);
                            fieldLabels.push(item.xValue);
                            validDatesSet.add(item.xValue); // 记录有数据的日期
                        }
                    });
                    
                    // 如果这个字段没有有效数据，跳过
                    if (fieldData.length === 0) {
                        console.warn(`字段 ${field} 没有有效数据，跳过`);
                        return;
                    }
                    
                    // 存储这个字段的数据和标签
                    finalDataMap[field] = {
                        data: fieldData,
                        labels: fieldLabels
                    };
                });
                
                // 构建最终标签：对于季度数据，只包含有数据的日期；对于日度数据，使用所有标签
                let finalLabels;
                if (isQuarterlyData) {
                    // 季度数据：只显示有数据的日期点
                    finalLabels = Array.from(validDatesSet).sort((a, b) => {
                        if (a.match(/^\d{4}-\d{2}-\d{2}/) && b.match(/^\d{4}-\d{2}-\d{2}/)) {
                            return a.localeCompare(b);
                        }
                        return a.localeCompare(b);
                    });
                } else {
                    // 日度数据：使用所有标签
                    finalLabels = labels;
                }
                
                // 为每个字段创建数据集
                yAxisFields.forEach((field, fieldIndex) => {
                    if (!finalDataMap[field]) return;
                    
                    const column = currentQueryResult.columns.find(col => col.field === field);
                    if (!column) return;
                    
                    const fieldInfo = finalDataMap[field];
                    const color = colors[fieldIndex % colors.length];
                    
                    // 构建数据数组，与finalLabels对齐（缺失值用null表示）
                    const data = finalLabels.map(label => {
                        const labelIndex = fieldInfo.labels.indexOf(label);
                        if (labelIndex >= 0) {
                            return fieldInfo.data[labelIndex];
                        }
                        return null; // 这个标签在这个字段中没有数据
                    });
                    
                    const dataset = {
                        label: column.display || field,
                        data: data,
                        borderColor: color,
                        backgroundColor: chartType === 'bar' ? color + '80' : color + '20',
                        borderWidth: 2,
                        fill: chartType === 'line',
                        tension: chartType === 'line' ? 0.4 : 0,
                        spanGaps: false, // 不连接缺失的数据点
                        pointRadius: isQuarterlyData ? 4 : 3, // 季度数据点更大更明显
                        pointHoverRadius: isQuarterlyData ? 6 : 5
                    };
                    
                    if (chartType === 'bar') {
                        dataset.type = 'bar';
                    } else if (chartType === 'scatter') {
                        dataset.type = 'scatter';
                    }
                    
                    datasets.push(dataset);
                });
                
                if (datasets.length === 0) {
                    console.warn(`图表 ${chartConfig.title} 没有有效数据，跳过生成`);
                    return;
                }
                
                // 创建图表
                const ctx = document.getElementById(`chart-${chartConfig.id}`);
                if (ctx) {
                    const chart = new Chart(ctx, {
                        type: chartConfig.chartType || 'line', // 图表类型
                        data: {
                            labels: finalLabels,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top',
                                    labels: {
                                        color: '#1a1a2e',
                                        font: {
                                            size: 12
                                        }
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                    titleColor: '#ffffff',
                                    bodyColor: '#ffffff',
                                    borderColor: 'rgba(255, 255, 255, 0.2)',
                                    borderWidth: 1,
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            },
                            scales: {
                                x: {
                                    ticks: {
                                        color: '#1a1a2e',
                                        maxRotation: 45,
                                        minRotation: 0
                                    },
                                    grid: {
                                        color: 'rgba(0, 0, 0, 0.1)'
                                    }
                                },
                                y: {
                                    ticks: {
                                        color: '#1a1a2e'
                                    },
                                    grid: {
                                        color: 'rgba(0, 0, 0, 0.1)'
                                    }
                                }
                            }
                        }
                    });
                    
                    chartInstances.push(chart);
                }
            });
            
            // 关闭配置模态框
            closeChartConfigModal();
            
            // 滚动到图表区域
            document.getElementById('charts-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 复制SQL到剪贴板
        function copySQL() {
            const sqlContent = document.getElementById('sql-content');
            if (!sqlContent) return;
            
            const sqlText = sqlContent.textContent || sqlContent.innerText;
            
            // 使用现代 Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(sqlText).then(() => {
                    showCopySuccess();
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyTextToClipboard(sqlText);
                });
            } else {
                // 降级方案
                fallbackCopyTextToClipboard(sqlText);
            }
        }
        
        // 降级复制方案
        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess();
                } else {
                    alert('复制失败，请手动选择并复制SQL语句');
                }
            } catch (err) {
                console.error('复制失败:', err);
                alert('复制失败，请手动选择并复制SQL语句');
            }
            
            document.body.removeChild(textArea);
        }
        
        // 显示复制成功提示
        function showCopySuccess() {
            const btn = document.querySelector('button[onclick="copySQL()"]');
            if (!btn) return;
            
            const originalText = btn.textContent;
            btn.textContent = '✓ 已复制';
            btn.style.background = 'rgba(16, 185, 129, 0.3)';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            }, 2000);
        }
        
        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;

        // ==================== SQL模板管理功能 ====================
        let currentQueryMode = 'table'; // 'table' 或 'template'
        let allTemplates = []; // 存储所有模板
        
        // 切换查询模式（skipLoad 用于 URL 带 execution_id 时由外部自行加载历史并带参）
        function switchQueryMode(mode, skipScreeningLoad) {

            const tableTab = document.getElementById('tab-table');
            const templateTab = document.getElementById('tab-template');
            const screeningTab = document.getElementById('tab-screening');
            const tablePanel = document.getElementById('table-query-panel');
            const templatePanel = document.getElementById('template-query-panel');
            const screeningPanel = document.getElementById('screening-query-panel');
            
            const setActive = (tab, panel) => {
                [tableTab, templateTab, screeningTab].forEach(t => {

        // 获取所有选中的股票代码（从多个维度）
        async function getAllSelectedStockCodes() {
            const stockCodes = [];
            
            // 1. 个股维度
            if (document.getElementById('dimension-stock') && document.getElementById('dimension-stock').checked) {
                stockCodes.push(...selectedStocks.map(s => s.code));
            }
            
            // 2. 概念股维度
            if (document.getElementById('dimension-concept') && document.getElementById('dimension-concept').checked) {
                const conceptSelect = document.getElementById('concept-select');
                if (conceptSelect) {
                    const selectedConceptIds = Array.from(conceptSelect.selectedOptions).map(opt => opt.value).filter(v => v);
                    
                    if (selectedConceptIds.length === 0) {
                        console.warn('概念维度已选择，但未选择任何概念');
                    }
                    
                    for (const conceptId of selectedConceptIds) {
                        try {
                            const response = await fetch(`/api/concept_stocks/${conceptId}/stocks`);
                            const data = await response.json();
                            if (data.success && data.stocks && Array.isArray(data.stocks)) {
                                data.stocks.forEach(stock => {
                                    // 兼容不同的数据格式
                                    const code = stock.code || stock.stock_code || '';
                                    if (code && !stockCodes.includes(code)) {
                                        stockCodes.push(code);
                                    }
                                });
                            } else if (data.success && (!data.stocks || data.stocks.length === 0)) {
                                console.warn(`概念 ${conceptId} 下没有股票`);
                            }
                        } catch (error) {
                            console.error(`获取概念股 ${conceptId} 的股票列表失败:`, error);
                        }
                    }
                }
            }
            
            // 3. 行业维度
            if (document.getElementById('dimension-industry') && document.getElementById('dimension-industry').checked) {
                const thirdIndustrySelect = document.getElementById('third-industry-select');
                if (thirdIndustrySelect) {
                    const selectedIndustries = Array.from(thirdIndustrySelect.selectedOptions).map(opt => opt.value).filter(v => v);
                    
                    if (selectedIndustries.length > 0) {
                        try {
                            const response = await fetch('/api/industries/get_stocks', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({industry_names: selectedIndustries})
                            });
                            const data = await response.json();
                            if (data.success && data.stocks) {
                                data.stocks.forEach(stock => {
                                    if (!stockCodes.includes(stock.code)) {
                                        stockCodes.push(stock.code);
                                    }
                                });
                            }
                        } catch (error) {
                            console.error('获取行业股票列表失败:', error);
                        }
                    }
                }
            }
            
            return stockCodes;
        }

        async function loadConceptStocksPreview(conceptIds) {
            const preview = document.getElementById('concept-stocks-preview');
            const stocksList = document.getElementById('concept-stocks-list');
            const stocksCount = document.getElementById('concept-stocks-count');
            
            if (!preview || !stocksList || !stocksCount) return;

            const allStocks = [];
            const stockCodeSet = new Set(); // 用于去重
            
            // 遍历所有选中的概念，获取股票列表
            for (const conceptId of conceptIds) {
                try {
                    const response = await fetch(`/api/concept_stocks/${conceptId}/stocks`);
                    const data = await response.json();

                const select = document.getElementById('concept-select');
                
                if (select && data.success) {
                    select.innerHTML = '<option value="">请选择概念股</option>';
                    data.concepts.forEach(concept => {
                        const option = document.createElement('option');
                        option.value = concept.id;
                        option.textContent = concept.name;
                        select.appendChild(option);
                    });
                    // 初始化显示
                    updateSelectedConcepts();
                } else if (select) {
                    select.innerHTML = '<option value="">加载失败</option>';
                }
            } catch (error) {
                console.error('加载概念股列表失败:', error);
            }
        }
        
        // 加载行业层级结构
        let industryHierarchy = {};
        async function loadIndustryHierarchy() {
            try {
                const response = await fetch('/api/industries/hierarchy');
                const data = await response.json();
                
                if (data.success) {
                    industryHierarchy = data.hierarchy;
                    const firstSelect = document.getElementById('first-industry-select');
                    if (firstSelect) {
                        firstSelect.innerHTML = '<option value="">请选择一级行业</option>';
                        
                        Object.keys(industryHierarchy).sort().forEach(first => {
                            const option = document.createElement('option');
                            option.value = first;
                            option.textContent = first;
                            firstSelect.appendChild(option);
                        });
                        
                    // 一级行业变化时更新二级行业
                    firstSelect.onchange = function() {
                        const secondSelect = document.getElementById('second-industry-select');
                        const thirdSelect = document.getElementById('third-industry-select');
                        
                        if (secondSelect) {
                            secondSelect.innerHTML = '<option value="">请选择二级行业</option>';
                        }
                        if (thirdSelect) {
                            thirdSelect.innerHTML = '<option value="">请先选择二级行业</option>';
                            // 清空已选择的行业显示
                            updateSelectedIndustries();
                        }
                        
                        if (this.value && industryHierarchy[this.value] && secondSelect) {
                            Object.keys(industryHierarchy[this.value]).sort().forEach(second => {
                                const option = document.createElement('option');
                                option.value = second;
                                option.textContent = second;
                                secondSelect.appendChild(option);
                            });
                        }
                        
                        updateIndustrySelection();
                    };
                    }
                    
                    // 二级行业变化时更新三级行业
                    const secondSelect = document.getElementById('second-industry-select');
                    if (secondSelect) {
                        secondSelect.onchange = function() {
                            const firstValue = document.getElementById('first-industry-select')?.value;
                            const thirdSelect = document.getElementById('third-industry-select');
                            
                            if (thirdSelect) {
                                thirdSelect.innerHTML = '<option value="">请选择三级行业</option>';
                                // 清空已选择的行业显示
                                updateSelectedIndustries();
                                
                                if (firstValue && this.value && industryHierarchy[firstValue] && industryHierarchy[firstValue][this.value]) {
                                    industryHierarchy[firstValue][this.value].sort().forEach(third => {
                                        const option = document.createElement('option');
                                        option.value = third;
                                        option.textContent = third;
                                        thirdSelect.appendChild(option);
                                    });
                                }
                            }
                            
                            updateIndustrySelection();
                        };
                    }
                }
            } catch (error) {
                console.error('加载行业层级失败:', error);
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTables();
            updateDimensionSections();
        });
    </script>
</body>
</html>
