<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ '编辑事件' if event else '新建事件' }}</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.12);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.5);
            
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .back-btn {
            padding: 0.625rem 1.25rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: var(--bg-glass-hover);
            border-color: var(--border-hover);
            transform: translateX(-4px);
        }

        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-glass);
            background-color: rgba(17, 17, 17, 0.9);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            font-family: inherit;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-glass-hover);
            background-color: rgba(17, 17, 17, 0.95);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group select option {
            background: #ffffff;
            background-color: #ffffff;
            color: #000000;
            padding: 0.75rem;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.8;
        }

        .form-group textarea::placeholder {
            color: var(--text-tertiary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .color-picker {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .color-option {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .color-option::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 1.25rem;
            opacity: 0;
            transition: var(--transition);
        }

        .color-option.selected::after {
            opacity: 1;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 0.875rem 2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-glass-hover);
            border-color: var(--border-hover);
        }

        .hint {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            line-height: 1.6;
        }

        .event-type-tabs {
            display: flex;
            gap: 0.75rem;
            background: var(--bg-glass);
            padding: 0.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        .event-type-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .event-type-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .reminder-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ '📅 编辑事件' if event else '📅 新建事件' }}</h1>
            <a href="{{ url_for('calendar') }}" class="back-btn">← 返回日历</a>
        </div>

        <form method="post" class="form-card">
            {% if event %}
            <input type="hidden" name="id" value="{{ event.id }}">
            {% endif %}

            <div class="form-group">
                <label for="title">事件标题 *</label>
                <input type="text" name="title" id="title" 
                       value="{{ event.title if event else '' }}" 
                       placeholder="例如：重要财报发布时间" required>
            </div>

            <div class="form-group">
                <label for="content">事件描述</label>
                <textarea name="content" id="content" 
                          placeholder="详细描述这个事件...">{{ event.content if event else '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="event_category">投研分类</label>
                <select name="event_category" id="event_category">
                    {% for key, meta in calendar_categories.items() %}
                    <option value="{{ key }}" {% if event and event.event_category == key %}selected{% elif not event and key == 'macro' %}selected{% endif %}>{{ meta.label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="related_stock">关联股票代码</label>
                <input type="text" name="related_stock" id="related_stock"
                       value="{{ event.related_stock if event else '' }}"
                       placeholder="如 000001、600519">
            </div>

            <div class="form-group">
                <label for="related_plan_id">关联交易计划</label>
                <select name="related_plan_id" id="related_plan_id">
                    <option value="">（不关联）</option>
                    {% for p in plan_options %}
                    <option value="{{ p.id }}" {% if event and event.related_plan_id == p.id %}selected{% endif %}>{{ p.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="start_date">开始日期 *</label>
                    <input type="date" name="start_date" id="start_date" 
                           value="{{ event.start_date if event else '' }}" required>
                </div>
                <div class="form-group">
                    <label for="end_date">结束日期</label>
                    <input type="date" name="end_date" id="end_date" 
                           value="{{ event.end_date if event else '' }}">
                </div>
            </div>

            <div class="form-group">
                <label>事件类型</label>
                <div class="event-type-tabs">
                    <div class="event-type-tab active" data-type="single">单日</div>
                    <div class="event-type-tab" data-type="multi">多日</div>
                    <div class="event-type-tab" data-type="recurring">周期</div>
                </div>
                <input type="hidden" name="event_type" id="event_type" value="{{ event.event_type if event else 'single' }}">
            </div>

            <div class="form-group">
                <label>颜色标签</label>
                <div class="color-picker" id="color-picker">
                    <div class="color-option selected" data-color="#6366f1" style="background: #6366f1;"></div>
                    <div class="color-option" data-color="#10b981" style="background: #10b981;"></div>
                    <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                    <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                    <div class="color-option" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                    <div class="color-option" data-color="#ec4899" style="background: #ec4899;"></div>
                    <div class="color-option" data-color="#06b6d4" style="background: #06b6d4;"></div>
                    <div class="color-option" data-color="#84cc16" style="background: #84cc16;"></div>
                </div>
                <input type="hidden" name="color" id="color" value="{{ event.color if event else '#6366f1' }}">
            </div>

            <div class="form-group">
                <label>提醒设置</label>
                <div class="reminder-options">
                    <div class="form-group" style="margin-bottom: 0;">
                        <select name="reminder_type" id="reminder_type">
                            <option value="none" {{ 'selected' if event and event.reminder_type == 'none' else '' }}>不提醒</option>
                            <option value="notification" {{ 'selected' if (not event) or event.reminder_type == 'notification' else '' }}>浏览器通知</option>
                            <option value="email" {{ 'selected' if event and event.reminder_type == 'email' else '' }}>邮件提醒（待实现）</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <select name="reminder_time" id="reminder_time">
                            <option value="0" {{ 'selected' if (not event) or event.reminder_time == 0 else '' }}>事件当天</option>
                            <option value="1440" {{ 'selected' if event and event.reminder_time == 1440 else '' }}>提前1天</option>
                            <option value="2880" {{ 'selected' if event and event.reminder_time == 2880 else '' }}>提前2天</option>
                            <option value="10080" {{ 'selected' if event and event.reminder_time == 10080 else '' }}>提前1周</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="actions">
                <a href="{{ url_for('calendar') }}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">💾 {{ '更新' if event else '创建' }}</button>
            </div>

            <div class="hint">
                💡 提示：投资日历可以帮助你记录重要事件，如财报发布时间、重要会议、关键日期等。设置提醒后，系统会在指定时间通知你。
            </div>
        </form>
    </div>

    <script>
        // 颜色选择器
        const colorOptions = document.querySelectorAll('.color-option');
        const colorInput = document.getElementById('color');
        const selectedColor = '{{ event.color if event else "#6366f1" }}';

        colorOptions.forEach(option => {
            if (option.dataset.color === selectedColor) {
                option.classList.add('selected');
            }
            option.addEventListener('click', function() {
                colorOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                colorInput.value = this.dataset.color;
            });
        });

        // 事件类型切换
        const eventTypeTabs = document.querySelectorAll('.event-type-tab');
        const eventTypeInput = document.getElementById('event_type');
        const currentType = '{{ event.event_type if event else "single" }}';

        eventTypeTabs.forEach(tab => {
            if (tab.dataset.type === currentType) {
                tab.classList.add('active');
            }
            tab.addEventListener('click', function() {
                eventTypeTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                eventTypeInput.value = this.dataset.type;
                
                // 如果是单日事件，自动设置结束日期
                if (this.dataset.type === 'single') {
                    const startDate = document.getElementById('start_date').value;
                    document.getElementById('end_date').value = startDate;
                }
            });
        });

        // 开始日期改变时，如果是单日事件，自动更新结束日期
        document.getElementById('start_date').addEventListener('change', function() {
            if (eventTypeInput.value === 'single') {
                document.getElementById('end_date').value = this.value;
            }
        });

        // 如果是新事件，设置默认日期为今天
        {% if not event %}
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('start_date').value = today;
        document.getElementById('end_date').value = today;
        {% endif %}

        // 如果URL中有date参数，设置日期
        const urlParams = new URLSearchParams(window.location.search);
        const dateParam = urlParams.get('date');
        if (dateParam) {
            document.getElementById('start_date').value = dateParam;
            document.getElementById('end_date').value = dateParam;
        }

        document.getElementById('title').focus();
    </script>
</body>
</html>
