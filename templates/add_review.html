<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if review %}编辑{% else %}添加{% endif %}复盘</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.12);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.5);
            
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            
            --review-color: #8b5cf6;
            --review-glow: rgba(139, 92, 246, 0.2);
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .back-btn {
            padding: 0.625rem 1.25rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: var(--bg-glass-hover);
            border-color: var(--border-hover);
            transform: translateX(-4px);
        }

        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .date-input {
            margin-bottom: 2.5rem;
        }

        .date-input input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-glass);
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .date-input input:focus {
            outline: none;
            border-color: var(--review-color);
            background: var(--bg-glass-hover);
            box-shadow: 0 0 0 3px var(--review-glow);
        }

        .fields-grid {
            display: grid;
            gap: 2rem;
        }

        .field-group {
            position: relative;
        }

        .field-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-label::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--review-color);
            border-radius: 50%;
        }

        .field-input {
            width: 100%;
            min-height: 120px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.9375rem;
            font-family: inherit;
            resize: vertical;
            transition: var(--transition);
            background: var(--bg-glass);
            color: var(--text-secondary);
            line-height: 1.8;
            backdrop-filter: blur(10px);
        }

        .field-input:focus {
            outline: none;
            border-color: var(--review-color);
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px var(--review-glow);
        }

        .field-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        .actions {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.875rem 2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--review-color) 0%, #7c3aed 100%);
            border-color: var(--review-color);
            color: white;
            box-shadow: 0 4px 12px var(--review-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px var(--review-glow);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-glass-hover);
            border-color: var(--border-hover);
        }

        .hint {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 {% if review %}编辑{% else %}添加{% endif %}复盘</h1>
            <a href="{{ url_for('index') }}" class="back-btn">← 返回</a>
        </div>

        <form method="post" class="form-card">
            <div class="date-input">
                <input type="date" name="date" id="date" value="{{ review.date if review else default_date }}" required>
            </div>

            <div class="fields-grid">
                <div class="field-group">
                    <div class="field-label">市场情绪</div>
                    <textarea name="market_emotion" class="field-input" placeholder="描述当前市场整体情绪...">{{ review.market_emotion if review else '' }}</textarea>
                </div>

                <div class="field-group">
                    <div class="field-label">板块</div>
                    <textarea name="sectors" class="field-input" placeholder="哪些板块表现突出？哪些板块走弱？">{{ review.sectors if review else '' }}</textarea>
                </div>

                <div class="field-group">
                    <div class="field-label">题材</div>
                    <textarea name="themes" class="field-input" placeholder="当前热点题材是什么？">{{ review.themes if review else '' }}</textarea>
                </div>

                <div class="field-group">
                    <div class="field-label">市值表现</div>
                    <textarea name="market_cap_performance" class="field-input" placeholder="大盘股、中盘股、小盘股的表现差异...">{{ review.market_cap_performance if review else '' }}</textarea>
                </div>

                <div class="field-group">
                    <div class="field-label">投资方式</div>
                    <textarea name="investment_style" class="field-input" placeholder="价值投资、成长投资、短线交易等...">{{ review.investment_style if review else '' }}</textarea>
                </div>

                <div class="field-group">
                    <div class="field-label">大事</div>
                    <textarea name="major_events" class="field-input" placeholder="政策、事件、新闻等重大事项...">{{ review.major_events if review else '' }}</textarea>
                </div>
            </div>

            <div class="actions">
                <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">💾 保存</button>
            </div>

            <div class="hint">
                💡 提示：复盘是固定模式的记录，每天一条，系统化地记录市场情况。
            </div>
        </form>
    </div>
</body>
</html>
