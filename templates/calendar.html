<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投研日历</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core@5.11.5/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid@5.11.5/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@5.11.5/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fullcalendar/list@5.11.5/main.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #000000;
            --bg-card: #111111;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #6366f1;
            --radius: 8px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }
        .top-bar {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.875rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 2000;
        }
        .top-bar h1 { font-size: 1.125rem; font-weight: 600; }
        .top-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: rgba(99, 102, 241, 0.85); border-color: rgba(99,102,241,0.5); }
        .main-content { padding: 1rem 1.25rem 2rem; max-width: 1920px; margin: 0 auto; }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.25rem;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }
        .legend-item { display: inline-flex; align-items: center; gap: 0.4rem; }
        .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
        #calendar-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            min-height: 640px;
        }
        #calendar { min-height: 600px; }
        .fc-theme-standard .fc-scrollgrid { border-color: var(--border); }
        .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border); }
        .fc .fc-toolbar-title { color: var(--text-primary); font-size: 1.1rem; }
        .fc .fc-button {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .fc .fc-button:hover { background: rgba(255,255,255,0.14); }
        .fc .fc-button-primary:not(:disabled).fc-button-active,
        .fc .fc-button-primary:not(:disabled):active { background: var(--accent); border-color: var(--accent); }
        .fc .fc-daygrid-day-number, .fc .fc-col-header-cell-cushion { color: var(--text-primary); }
        .fc .fc-daygrid-day.fc-day-today { background: rgba(99, 102, 241, 0.12) !important; }
        .fc .fc-list-event:hover td { background: rgba(255,255,255,0.06); }
        .fc .fc-list-day-cushion, .fc .fc-list-table { background: transparent; color: var(--text-primary); }
        .fc-theme-standard .fc-list { border-color: var(--border); }
        .events-sidebar {
            margin-top: 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
        }
        .events-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .event-list-item {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            font-size: 0.875rem;
        }
        .event-list-item:hover { background: rgba(255,255,255,0.08); }
        .event-list-item.plan-item { border-left: 3px solid #f59e0b; }
        .empty-calendar { color: var(--text-secondary); text-align: center; padding: 2rem; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 { font-size: 1rem; font-weight: 600; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            line-height: 1;
            cursor: pointer;
            padding: 0.25rem;
        }
        .modal-body { padding: 1.25rem; }
        .form-row { margin-bottom: 1rem; }
        .form-row label { display: block; font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 0.35rem; }
        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 0.5rem 0.65rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #0a0a0a;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        .form-row textarea { min-height: 88px; resize: vertical; }
        .form-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        @media (max-width: 520px) { .form-inline { grid-template-columns: 1fr; } }
        .modal-footer {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: flex-end;
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .link-row { margin-top: 0.75rem; font-size: 0.8125rem; }
        .link-row a { color: #93c5fd; margin-right: 0.75rem; }
        .hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/list@5.11.5/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@5.11.5/main.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <h1>投研日历</h1>
        <div class="top-actions">
            <a href="{{ url_for('index') }}" class="btn">← 返回</a>
            <a href="{{ url_for('add_calendar_event') }}" class="btn btn-primary">完整表单</a>
        </div>
    </div>

    <div class="main-content">
        <div class="legend" id="category-legend"></div>
        <div id="calendar-wrap">
            <div id="calendar"></div>
        </div>

        <div class="events-sidebar">
            <div class="events-title">近期事件与计划</div>
            <div id="events-list"></div>
        </div>
    </div>

    <div class="modal-overlay" id="event-modal" role="dialog" aria-modal="true">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">事件</h2>
                <button type="button" class="modal-close" id="modal-close" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="f-id" value="">
                <div class="form-row">
                    <label for="f-title">标题</label>
                    <input type="text" id="f-title" placeholder="例如：美国 CPI 公布">
                </div>
                <div class="form-row">
                    <label for="f-category">分类</label>
                    <select id="f-category"></select>
                </div>
                <div class="form-inline">
                    <div class="form-row">
                        <label for="f-start">开始日期</label>
                        <input type="date" id="f-start">
                    </div>
                    <div class="form-row">
                        <label for="f-end">结束日期（含）</label>
                        <input type="date" id="f-end">
                    </div>
                </div>
                <div class="form-row">
                    <label for="f-content">备注</label>
                    <textarea id="f-content" placeholder="补充说明、链接等"></textarea>
                </div>
                <div class="form-row">
                    <label for="f-stock">关联股票代码</label>
                    <input type="text" id="f-stock" placeholder="如 000001、600519">
                    <p class="hint">保存后可在下方打开「行业库存」个股分析页（自动填入代码）。</p>
                </div>
                <div class="form-row">
                    <label for="f-plan">关联交易计划</label>
                    <select id="f-plan">
                        <option value="">（不关联）</option>
                    </select>
                </div>
                <div class="form-inline">
                    <div class="form-row">
                        <label for="f-reminder-type">提醒</label>
                        <select id="f-reminder-type">
                            <option value="notification">浏览器提醒</option>
                            <option value="none">不提醒</option>
                            <option value="email">邮件（占位）</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="f-reminder-time">提前</label>
                        <select id="f-reminder-time">
                            <option value="0">当天</option>
                            <option value="1440">提前 1 天</option>
                            <option value="2880">提前 2 天</option>
                            <option value="10080">提前 1 周</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <label for="f-event-type">跨度类型</label>
                    <select id="f-event-type">
                        <option value="single">单日</option>
                        <option value="multi">多日</option>
                        <option value="recurring">周期</option>
                    </select>
                </div>
                <div class="link-row" id="modal-links" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" id="btn-delete" style="display:none;">删除</button>
                <a class="btn" id="btn-full-edit" href="#" style="display:none;">打开完整编辑页</a>
                <button type="button" class="btn" id="btn-cancel">取消</button>
                <button type="button" class="btn btn-primary" id="btn-save">保存</button>
            </div>
        </div>
    </div>

    <script>
        const PLAN_OPTIONS = {{ plan_options | tojson | safe }};
        const CATEGORIES = {{ calendar_categories | tojson | safe }};
        const upcomingPlans = {{ upcoming_plans | tojson | safe }} || [];

        function fcEndExclusiveToInclusive(startStr, endExclusiveStr) {
            if (!endExclusiveStr) return startStr.slice(0, 10);
            const a = new Date(startStr.slice(0, 10));
            const b = new Date(endExclusiveStr.slice(0, 10));
            b.setDate(b.getDate() - 1);
            return b.toISOString().slice(0, 10);
        }

        function inclusiveEndToFcExclusive(startStr, endInclusiveStr) {
            const s = startStr.slice(0, 10);
            const e = (endInclusiveStr || s).slice(0, 10);
            if (e <= s) return null;
            const d = new Date(e);
            d.setDate(d.getDate() + 1);
            return d.toISOString().slice(0, 10);
        }

        function fillCategorySelect(sel) {
            sel.innerHTML = '';
            Object.keys(CATEGORIES).forEach(k => {
                const o = document.createElement('option');
                o.value = k;
                o.textContent = CATEGORIES[k].label;
                sel.appendChild(o);
            });
        }

        function fillPlanSelect(sel) {
            const cur = sel.value;
            sel.innerHTML = '<option value="">（不关联）</option>';
            (PLAN_OPTIONS || []).forEach(p => {
                const o = document.createElement('option');
                o.value = String(p.id);
                o.textContent = p.title;
                sel.appendChild(o);
            });
            if (cur) sel.value = cur;
        }

        function buildLegend() {
            const el = document.getElementById('category-legend');
            el.innerHTML = Object.keys(CATEGORIES).map(k =>
                `<span class="legend-item"><span class="legend-swatch" style="background:${CATEGORIES[k].color}"></span>${CATEGORIES[k].label}</span>`
            ).join('');
        }

        function renderSidebar() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const next = new Date(today);
            next.setDate(next.getDate() + 7);

            fetch('/api/calendar/events')
                .then(r => r.json())
                .then(events => {
                    const upcomingEvents = events.map(ev => ({
                        type: 'event',
                        id: ev.extendedProps.db_id,
                        title: ev.title,
                        date: ev.start,
                        content: ev.extendedProps.content,
                        event_category: ev.extendedProps.event_category,
                    })).filter(e => {
                        const d = new Date(e.date);
                        d.setHours(0, 0, 0, 0);
                        return d >= today && d <= next;
                    });

                    const all = [...upcomingEvents, ...upcomingPlans].sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 15);
                    const box = document.getElementById('events-list');
                    if (!all.length) {
                        box.innerHTML = '<div class="empty-calendar">暂无近期事件</div>';
                        return;
                    }
                    box.innerHTML = all.map(item => {
                        const isPlan = item.type === 'plan';
                        const dt = new Date(item.date);
                        const dateStr = dt.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' });
                        const icon = isPlan ? '📋' : '📅';
                        const click = isPlan ? `location.href='/plans/edit/${item.id}'` : `window.__openEventById(${item.id})`;
                        return `<div class="event-list-item ${isPlan ? 'plan-item' : ''}" onclick="${click}">
                            <strong>${icon} ${escapeHtml(item.title)}</strong>
                            <div style="color:#888;font-size:0.8rem;margin-top:0.25rem">${dateStr}</div>
                            ${item.content ? `<div style="color:#aaa;font-size:0.8rem;margin-top:0.35rem">${escapeHtml(item.content).slice(0, 120)}</div>` : ''}
                        </div>`;
                    }).join('');
                })
                .catch(() => {
                    document.getElementById('events-list').innerHTML = '<div class="empty-calendar">加载失败</div>';
                });
        }

        function escapeHtml(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        const modal = document.getElementById('event-modal');
        const fId = document.getElementById('f-id');
        const fTitle = document.getElementById('f-title');
        const fCategory = document.getElementById('f-category');
        const fStart = document.getElementById('f-start');
        const fEnd = document.getElementById('f-end');
        const fContent = document.getElementById('f-content');
        const fStock = document.getElementById('f-stock');
        const fPlan = document.getElementById('f-plan');
        const fReminderType = document.getElementById('f-reminder-type');
        const fReminderTime = document.getElementById('f-reminder-time');
        const fEventType = document.getElementById('f-event-type');
        const modalLinks = document.getElementById('modal-links');
        const btnDelete = document.getElementById('btn-delete');
        const btnFullEdit = document.getElementById('btn-full-edit');

        let calendar = null;

        function openModal() {
            modal.classList.add('open');
        }
        function closeModal() {
            modal.classList.remove('open');
        }

        function updateModalLinks() {
            const stock = fStock.value.trim();
            const pid = fPlan.value;
            let html = '';
            if (stock) {
                const u = '/industry_inventory?q=' + encodeURIComponent(stock);
                html += `<a href="${u}" target="_blank" rel="noopener">打开个股分析（行业库存）</a>`;
            }
            if (pid) {
                html += `<a href="/plans/edit/${encodeURIComponent(pid)}" target="_blank" rel="noopener">打开计划详情</a>`;
            }
            modalLinks.innerHTML = html;
            modalLinks.style.display = html ? 'block' : 'none';
        }

        fStock.addEventListener('input', updateModalLinks);
        fPlan.addEventListener('change', updateModalLinks);

        function openCreateFromSelect(startStr, endStrExclusive) {
            document.getElementById('modal-title').textContent = '新建事件';
            fId.value = '';
            fTitle.value = '';
            fContent.value = '';
            fStock.value = '';
            fPlan.value = '';
            fCategory.value = 'macro';
            fillPlanSelect(fPlan);
            fReminderType.value = 'notification';
            fReminderTime.value = '0';
            const s = startStr.slice(0, 10);
            fStart.value = s;
            const endInc = fcEndExclusiveToInclusive(startStr, endStrExclusive || null);
            fEnd.value = endInc;
            fEventType.value = s === endInc ? 'single' : 'multi';
            btnDelete.style.display = 'none';
            btnFullEdit.style.display = 'none';
            updateModalLinks();
            openModal();
        }

        function openEditFromEvent(ev) {
            document.getElementById('modal-title').textContent = '编辑事件';
            const ep = ev.extendedProps;
            fillPlanSelect(fPlan);
            fId.value = String(ep.db_id);
            fTitle.value = ev.title || '';
            fContent.value = ep.content || '';
            fStock.value = ep.related_stock || '';
            fPlan.value = ep.related_plan_id ? String(ep.related_plan_id) : '';
            fCategory.value = ep.event_category in CATEGORIES ? ep.event_category : 'other';
            fStart.value = ev.startStr.slice(0, 10);
            const endInc = fcEndExclusiveToInclusive(ev.startStr, ev.endStr || null);
            fEnd.value = endInc;
            fReminderType.value = ep.reminder_type || 'notification';
            fReminderTime.value = String(ep.reminder_time != null ? ep.reminder_time : 0);
            fEventType.value = ep.event_type || 'single';
            btnDelete.style.display = 'inline-block';
            btnFullEdit.href = '/calendar/edit/' + ep.db_id;
            btnFullEdit.style.display = 'inline-block';
            updateModalLinks();
            openModal();
        }

        function openEditFromApiPayload(ev) {
            const ep = ev.extendedProps || {};
            document.getElementById('modal-title').textContent = '编辑事件';
            fId.value = String(ep.db_id);
            fTitle.value = ev.title || '';
            fContent.value = ep.content || '';
            fStock.value = ep.related_stock || '';
            fPlan.value = ep.related_plan_id ? String(ep.related_plan_id) : '';
            fCategory.value = ep.event_category in CATEGORIES ? ep.event_category : 'other';
            fStart.value = (ev.start || '').slice(0, 10);
            const endInc = ev.end ? fcEndExclusiveToInclusive(ev.start, ev.end) : fStart.value;
            fEnd.value = endInc;
            fReminderType.value = ep.reminder_type || 'notification';
            fReminderTime.value = String(ep.reminder_time != null ? ep.reminder_time : 0);
            fEventType.value = ep.event_type || 'single';
            btnDelete.style.display = 'inline-block';
            btnFullEdit.href = '/calendar/edit/' + ep.db_id;
            btnFullEdit.style.display = 'inline-block';
            fillPlanSelect(fPlan);
            fPlan.value = ep.related_plan_id ? String(ep.related_plan_id) : '';
            updateModalLinks();
            openModal();
        }

        window.__openEventById = function (id) {
            const calEv = calendar && calendar.getEventById(String(id));
            if (calEv) {
                openEditFromEvent(calEv);
                return;
            }
            fetch('/api/calendar/events')
                .then(r => r.json())
                .then(list => {
                    const ev = (list || []).find(e => e.extendedProps && e.extendedProps.db_id === id);
                    if (ev) openEditFromApiPayload(ev);
                });
        };

        function persistFromForm() {
            const payload = {
                id: fId.value ? parseInt(fId.value, 10) : null,
                title: fTitle.value.trim() || '未命名事件',
                content: fContent.value,
                start_date: fStart.value,
                end_date: fEnd.value || fStart.value,
                reminder_type: fReminderType.value,
                reminder_time: parseInt(fReminderTime.value, 10),
                event_type: fEventType.value,
                event_category: fCategory.value,
                related_stock: fStock.value.trim(),
                related_plan_id: fPlan.value ? parseInt(fPlan.value, 10) : null,
            };
            return fetch('/api/calendar/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            }).then(r => r.json());
        }

        document.getElementById('btn-save').addEventListener('click', () => {
            persistFromForm().then(res => {
                if (!res.success) {
                    alert(res.error || '保存失败');
                    return;
                }
                closeModal();
                calendar.refetchEvents();
                renderSidebar();
            }).catch(() => alert('网络错误'));
        });

        document.getElementById('btn-delete').addEventListener('click', () => {
            const id = fId.value;
            if (!id || !confirm('确定删除该事件？')) return;
            fetch('/api/calendar/events/' + id + '/delete', { method: 'POST' })
                .then(r => r.json())
                .then(res => {
                    if (!res.success) return;
                    closeModal();
                    calendar.refetchEvents();
                    renderSidebar();
                });
        });

        document.getElementById('btn-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-close').addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

        document.addEventListener('DOMContentLoaded', () => {
            fillCategorySelect(fCategory);
            fillPlanSelect(fPlan);
            buildLegend();

            const el = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(el, {
                plugins: ['interaction', 'dayGrid', 'timeGrid', 'list'],
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,listMonth',
                },
                buttonText: { today: '今天', month: '月', week: '周', list: '列表' },
                height: 'auto',
                editable: true,
                selectable: true,
                selectMirror: true,
                dayMaxEvents: true,
                navLinks: true,
                events: (info, successCallback, failureCallback) => {
                    const u = '/api/calendar/events?start=' + encodeURIComponent(info.startStr) + '&end=' + encodeURIComponent(info.endStr);
                    fetch(u).then(r => r.json()).then(successCallback).catch(failureCallback);
                },
                select: info => {
                    openCreateFromSelect(info.startStr, info.endStr);
                    calendar.unselect();
                },
                eventClick: info => {
                    info.jsEvent.preventDefault();
                    openEditFromEvent(info.event);
                },
                eventDrop: info => saveDragResize(info.event),
                eventResize: info => saveDragResize(info.event),
            });
            calendar.render();
            renderSidebar();
        });

        function saveDragResize(calEvent) {
            const ep = calEvent.extendedProps;
            const start = calEvent.startStr.slice(0, 10);
            const endInc = fcEndExclusiveToInclusive(calEvent.startStr, calEvent.endStr || null);
            fetch('/api/calendar/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: ep.db_id,
                    title: calEvent.title,
                    content: ep.content || '',
                    start_date: start,
                    end_date: endInc,
                    reminder_type: ep.reminder_type || 'notification',
                    reminder_time: ep.reminder_time != null ? ep.reminder_time : 0,
                    event_type: ep.event_type || 'single',
                    event_category: ep.event_category || 'other',
                    related_stock: ep.related_stock || '',
                    related_plan_id: ep.related_plan_id || null,
                }),
            }).then(r => r.json()).then(res => {
                if (!res.success) {
                    alert(res.error || '同步失败');
                    calEvent.revert();
                    return;
                }
                renderSidebar();
            }).catch(() => {
                calEvent.revert();
            });
        }

        setInterval(() => {
            fetch('/api/calendar/check_reminders')
                .then(r => r.json())
                .then(reminders => {
                    reminders.forEach(rem => {
                        if (typeof showNotification === 'function') showNotification('提醒: ' + rem.title + ' — ' + rem.date, 'info');
                    });
                }).catch(() => {});
        }, 60000);

        function showNotification(message, type) {
            const n = document.createElement('div');
            n.style.cssText = 'position:fixed;top:20px;right:20px;padding:12px 16px;background:#6366f1;color:#fff;border-radius:8px;z-index:9999;max-width:360px;font-size:0.875rem;';
            n.textContent = message;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 5000);
        }
    </script>
</body>
</html>
