<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>确认删除</title>
    <style>
        /* 全局样式 */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        /* 头部样式 */
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        /* 主内容区域样式 */
        main {
            max-width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* 表单标签样式 */
        form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* 输入框样式 */
        form input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* 提交按钮样式 */
        form input[type="submit"] {
            background-color: #dc3545;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        form input[type="submit"]:hover {
            background-color: #c82333;
        }

        /* 取消链接样式 */
        a {
            display: block;
            margin-top: 15px;
            color: #007bff;
            text-align: center;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>
        <h1>确认删除</h1>
    </header>
    <main>
        <form method="post">
            <label for="password">请输入您的密码以确认删除:</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" value="确认删除">
        </form>
        <a href="{{ url_for('index') }}">取消</a>
    </main>
</body>

</html>
